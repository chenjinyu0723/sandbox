# MinerU DOCX/PPTX → Markdown 配置文件
# 修改此文件后无需重启，每次运行 main.py 会自动读取

llm:
  # OpenAI 兼容的 API 配置
  # 将 api_key 改为你的真实 key 即可启用图片描述功能
  api_key: "sk-teamo-2fc0fc077066f03db0dc4741ebe060da44b4c511d6d5a385"
  base_url: "https://api.teamorouter.com/v1"
  model: "gpt-5.6-luna"
  max_tokens: 1500
  temperature: 0.3

  # 图片描述使用的系统提示词
  system_prompt: |
    你是一个专业的文档图片分析助手。你的任务是将图片内容转换为适合嵌入 Markdown 文档的详细描述。

    规则：
    1. 直接描述图片内容，禁止任何开场白（如"好的"、"这张图片展示了"、"我来为你解析"等），也禁止结束语
    2. 如果图片包含文字，请完整转录
    3. 如果图片是图表，描述其类型、数据趋势和关键数值
    4. 如果图片是结构图/流程图/架构图，描述组成部分及其关系
    5. 如果图片是表格的截图，用 Markdown 表格格式输出
    6. 使用简洁专业的语言，优先用中文
    7. 输出可直接嵌入 Markdown，可包含表格、列表、加粗等格式

    ## 输出示例（好的格式）：
    系统包含三个核心模块：**数据采集层**负责从传感器读取原始数据；**处理引擎**对数据进行清洗和转换；**输出层**将结果写入数据库并生成报表。

    ## 输出示例（坏的格式——禁止）：
    好的，接下来我为你解析这张图片。这是一张系统架构图，图中展示了...

  # 用户提示词（图片描述请求）
  user_prompt: "请描述这张图片的内容。"

# 图片输出配置
images:
  # 图片命名格式：{index}.{ext}，index 从 1 开始
  # 去重：相同内容的图片只保存一份，后续引用复用
  name_format: "{index}.{ext}"
